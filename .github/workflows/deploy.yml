name: Deploy to Hetzner VPS

on:
  push:
    branches: [master]

jobs:
  # Fail fast on type / lint / build errors before touching the VPS.
  # Deploy only runs if this job is green.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # Sync the Prisma schema to prod BEFORE the service restarts. Runs the
  # additive-migration pattern: new nullable columns land in the DB first,
  # then the deploy job ships code that reads them.
  #
  # Only touches prisma/schema.prisma on disk — the running service keeps
  # using its current code + client until the deploy job rebuilds and
  # restarts. `prisma db push` is idempotent, so every deploy runs it
  # even when there's no schema delta (it's a ~100ms no-op).
  #
  # Additive-only contract: safe for ADD COLUMN / loosening NOT NULL.
  # DROP COLUMN / tightening NOT NULL would break the running service
  # between the migrate and deploy steps — for those, do a two-commit
  # dance (stop-reading → drop).
  migrate:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Sync Prisma schema to prod DB
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            # Repo is owned by user `kaia`; SSH login is `roy`. Wrap in sudo
            # so git + prisma can touch the working tree (matches the deploy
            # step's `sudo bash deploy-call-assistant.sh` pattern).
            sudo bash <<'REMOTESCRIPT'
            set -e
            cd /home/kaia/doai/call-assistant
            git fetch origin master
            # Pull only the schema onto disk — leave the rest of the
            # working tree alone so the running service is unaffected.
            git checkout origin/master -- prisma/schema.prisma
            # --url overrides DATABASE_URL from prisma.config.ts. Prisma 7
            # removed --skip-generate; the deploy step re-runs `prisma
            # generate` anyway so we don't need to here.
            npx prisma db push --url="${{ secrets.PROD_DATABASE_URL }}"
            REMOTESCRIPT

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo bash /home/kaia/deploy-hooks/deploy-call-assistant.sh
            echo "==> Deploy complete!"
