services:
  postgres:
    image: postgres:16
    container_name: doai-call-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: doai_calls_dev
    ports:
      - "5432:5432"
    volumes:
      - doai_pg_data:/var/lib/postgresql/data

volumes:
  doai_pg_data:
